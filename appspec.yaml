    database_rules:
      - "Foreign Keys aktivieren."
      - "Zeitwerte als UTC speichern."
      - "Limits und Zähler atomar aktualisieren."
      - "Secrets, Roh-Tokens, TOTP-Codes und vollständige IP-Adressen nie in Audit-Metadaten speichern."

  api_contract:
    prefix: "/api"
    format: "JSON except streamed file bodies"
    owner_routes:
      - "POST /auth/totp/login"
      - "POST /auth/recovery/login"
      - "POST /auth/logout"
      - "POST /auth/logout-all"
      - "GET /files"
      - "POST /files/upload/init"
      - "POST /files/upload/complete"
      - "GET /files/{file_id}"
      - "GET /files/{file_id}/download"
      - "PATCH /files/{file_id}"
      - "DELETE /files/{file_id}"
      - "POST /download-shares"
      - "GET /download-shares"
      - "DELETE /download-shares/{share_id}"
      - "POST /upload-requests"
      - "GET /upload-requests"
      - "GET /upload-requests/{request_id}"
      - "DELETE /upload-requests/{request_id}"
      - "GET /activity"
      - "GET /admin/diagnostics"
      - "GET /admin/logs"
    public_routes:
      - "POST /public/download-shares/resolve"
      - "GET /public/download-shares/session/info"
      - "GET /public/download-shares/session/download/{file_ref}"
      - "POST /public/upload-requests/resolve"
      - "GET /public/upload-requests/session/info"
      - "POST /public/upload-requests/session/submissions/init"
      - "POST /public/upload-requests/session/submissions/{submission_ref}/files"
      - "POST /public/upload-requests/session/submissions/{submission_ref}/complete"
    required_http_behavior:
      invalid_capability: "404 statt Unterscheidung zwischen unbekannt, abgelaufen und widerrufen"
      oversized_upload: 413
      rate_limited: 429
      unauthorized_owner: 401
      forbidden_scope: 403
      conflict_limit_exhausted: 409
      no_store_for_sensitive_responses: true
      request_id_header: "X-Request-ID"

  security_controls:
    transport:
      https_required: true
      hsts_at_reverse_proxy: true
    application_headers:
      - "Content-Security-Policy"
      - "Referrer-Policy: no-referrer"
      - "X-Content-Type-Options: nosniff"
      - "Permissions-Policy with unnecessary features disabled"
      - "Cross-Origin-Opener-Policy: same-origin"
      - "Cross-Origin-Resource-Policy: same-origin where compatible"
    csrf:
      owner_mutations: "Synchronizer token plus SameSite=Strict session cookie"
      capability_mutations: "Capability-session-bound CSRF token"
    cors:
      default: "same-origin only"
      wildcard_allowed: false
    logging_redaction:
      redact:
        - "Authorization"
        - "Cookie"
        - "Set-Cookie"
        - "TOTP fields"
        - "capability secrets"
        - "recovery codes"
        - "setup secret"
        - "master key"
        - "query strings on sensitive routes"
    brute_force_protection:
      rate_limits_required: true
      uniform_response_timing: true
      constant_time_secret_compare: true
    upload_security:
      - "Dateien außerhalb des Web-Roots speichern."
      - "Keine Dateipfade aus Benutzereingaben bilden."
      - "Alle Downloads als Attachment ausliefern."
      - "Keine serverseitige Ausführung oder Vorschau."
      - "Dateigröße während des Streams kontrollieren."
      - "Temporäre Uploads mit restriktiven Rechten anlegen."
      - "Optional Malware-Scan und Quarantäne."
    privacy:
      analytics: false
      third_party_resources: false
      full_ip_storage: false
      ip_hash_rotation_days: 7
      access_log_token_protection: true
    dependency_security:
      - "Lockfile verpflichtend."
      - "Automatisierte Dependency-Updates konfigurieren."
      - "Container- und Dependency-Scan in CI."
      - "Keine unmaintained Upload- oder Kryptobibliotheken verwenden."

