          - "max_total_bytes_per_submission"
          - "max_total_bytes_all_submissions"
          - "accepted_total_bytes"
          - "allowed_extensions_json"
          - "denied_extensions_json"
          - "submitter_name_mode"
          - "submitter_message_mode"
          - "retain_seconds"
          - "revoked_at"
      submissions:
        primary_key: "id_uuidv7"
        fields:
          - "upload_request_id"
          - "public_reference"
          - "submitter_name"
          - "submitter_message"
          - "source_ip_hash"
          - "created_at"
          - "completed_at"
          - "file_count"
          - "total_bytes"
