  notifications:
    in_app:
      required: true
      toasts:
        - "upload completed"
        - "link copied"
        - "share revoked"
        - "settings saved"
        - "non-blocking error"
    apprise:
      optional: true
      events_default:
        - "upload request submission completed"
        - "storage critical"
        - "malware detected"
      secrets_redacted: true

  observability:
    logs:
      format: "structured JSON"
      levels:
        - "debug"
        - "info"
        - "warn"
        - "error"
      retention_days_default: 14
      downloadable_from_admin: true
      token_redaction_required: true
    metrics:
      phase: 2
      format: "Prometheus"
      endpoint: "/metrics"
      default_public: false
    diagnostics:
      checks:
        - "database readable and writable"
        - "storage readable and writable"
        - "free disk space"
        - "cleanup worker heartbeat"
        - "server clock sanity"
        - "reverse proxy HTTPS awareness"
        - "ClamAV connectivity if configured"
        - "master key decrypt test"
      must_not_expose_secrets: true
    audit_retention_days_default: 30

  background_jobs:
    scheduler:
      type: "single-process lease with database lock"
      safe_for_single_replica: true
    jobs:
      - id: "expiry_cleanup"
        cadence: "every 5 minutes"
      - id: "orphan_temp_cleanup"
        cadence: "hourly"
      - id: "audit_retention_cleanup"
        cadence: "daily"
      - id: "log_retention_cleanup"
        cadence: "daily"
      - id: "storage_health_check"
        cadence: "every 5 minutes"

  ci_cd:
    repository_requirements:
      - "README.md nach dem gemeinsamen Ishiku/Pixel-Soft-Utility-Muster."
      - "appspec.yaml im Repository-Root."
      - "pixel_design.yaml und benötigte lokale Design-Tokens einbinden."
      - "LICENSE nach Nutzerentscheidung."
      - "SECURITY.md mit privatem Meldeweg."
      - ".env.example ohne echte Geheimnisse."
      - "docker-compose.example.yml für ZimaOS-orientierten Betrieb."
    pipeline:
      - "lint"
      - "typecheck"
      - "unit tests"
      - "integration tests"
      - "frontend build"
      - "Docker build amd64/arm64"
      - "dependency vulnerability scan"
      - "container vulnerability scan"
      - "SBOM generation"
    build_metadata:
      inject:
        - "version"
        - "build date"
        - "Git SHA"
      ui_location: "About/Admin Info only"

  testing:
    unit_tests_required:
      - "10-digit TOTP generation and verification including leading zeros"
      - "TOTP boundary at 30-second rollover"
      - "TOTP replay rejection"
      - "rate-limit escalation and Retry-After"
      - "capability token hash verification"
      - "expiry calculation max 168 hours"
      - "pin/unpin state transitions"
      - "upload request byte and count limits"
      - "safe Content-Disposition encoding"
      - "filename normalization and path traversal rejection"
    integration_tests_required:
      - "first-run setup and two-window TOTP verification"
      - "owner upload streamed to disk"
      - "owner download"
      - "download share resolution using URL fragment secret exchange"
      - "revoked and expired links return indistinguishable not-available response"
      - "upload request cannot list or download files"
      - "concurrent submissions cannot exceed max_submissions"
      - "concurrent downloads cannot exceed max_downloads"
      - "cleanup removes expired unpinned files"
      - "cleanup preserves pinned files"
      - "public share expiry remains active for pinned files"
      - "malware scan quarantine flow when ClamAV is configured"
      - "session expiry and logout-all"
    end_to_end_tests_required:
      - "mobile owner login and upload"
      - "mobile file download"
      - "create and copy download link"
      - "create upload request with custom limits"
      - "anonymous upload via request link"
      - "owner receives and pins submitted file"
      - "theme and mode persistence"
      - "keyboard-only desktop operation"
    security_tests_required:
      - "CSRF attempts"
      - "stored and reflected XSS through filenames and messages"
      - "path traversal filenames"
      - "oversized Content-Length and chunked overrun"
      - "token leakage in logs"
      - "brute-force rate limiting"
      - "capability scope confusion"
      - "IDOR attempts against file IDs"
      - "malformed archive treated as opaque file"

  acceptance_criteria:
    release_blockers:
      - "Owner kann die App ohne erfolgreich getesteten 10-stelligen TOTP nicht einrichten."
      - "Owner kann sich mit einem gültigen 30-Sekunden-TOTP anmelden."
      - "Fünf schnelle Fehlversuche lösen ein wirksames Rate-Limit aus."
      - "Upload und Download streamen ohne vollständiges Puffern im RAM."
      - "Keine Datei liegt im Web-Root oder unter ihrem Originalnamen."
      - "Ungepinnte Dateien werden spätestens 168 Stunden nach abgeschlossenem Upload gelöscht."
      - "Angepinnte Dateien werden nicht automatisch gelöscht."
      - "Öffentliche Freigaben sind auch für angepinnte Dateien maximal 7 Tage gültig."
      - "Download-Freigaben können optional durch maximale Downloadzahl begrenzt werden."
      - "Upload-Anfragen können Ablaufzeit, Dateigröße, Dateianzahl, Einreichungsanzahl und Gesamtgröße begrenzen."
      - "Upload-Anfragen erlauben keinerlei Auflistung oder Download."
      - "Freigabe-Geheimnisse erscheinen standardmäßig nicht im HTTP-Pfad oder in Server-Access-Logs."
      - "TOTP-Secrets, Recovery-Codes und Capability-Secrets werden nie im Klartext geloggt."
      - "Mobile und Desktop UI folgen dem Pixel Soft Utility Designsystem."
      - "System/Light/Dark sowie Lavender/Mint/Sky/Amber/Graphite funktionieren und werden lokal persistiert."
      - "Version, Build-Datum, Git SHA, Diagnostik und Logs befinden sich ausschließlich in About/Admin Info."
      - "Docker-Image läuft als Non-Root auf amd64 und arm64."
    performance_targets:
      initial_page_load_gzip_kib_max: 350
      api_metadata_p95_ms_local_network: 250
      upload_memory_overhead_mib_per_stream_max: 32
      download_memory_overhead_mib_per_stream_max: 16
      sqlite_busy_retries_required: true

  phased_delivery:
    phase_1_mvp:
      includes:
        - "Single-user first-run setup"
        - "10-digit TOTP login"
        - "Recovery codes"
        - "Owner sessions and rate limiting"
        - "Streamed local filesystem uploads/downloads"
        - "File expiry and pinning"
        - "Single- and multi-file download share page"
        - "Write-only upload requests with all core limits"
        - "Capability links with fragment secret"
        - "Activity log"
        - "Pixel Soft Utility responsive UI"
        - "Docker image and Compose example"
        - "Optional ClamAV integration"
    phase_2:
      includes:
        - "tus resumable uploads"
        - "ZIP download for multi-file shares and submissions"
        - "Optional extra passphrase on public shares"
        - "At-rest file encryption"
        - "S3-compatible storage driver"
        - "Prometheus metrics"
        - "Apprise notifications"
    explicitly_deferred:
      - "Multi-user accounts"
      - "Public registration"
      - "Folder sync client"
      - "Inline media previews"
      - "Document conversion"
      - "Archive extraction"

  practical_extensions_recommended:
    - id: "clipboard_upload"
      priority: "high"
      description: "Bilder und Dateien direkt aus der Zwischenablage in die Upload-Zone einfügen."
    - id: "qr_links"
      priority: "high"
      description: "Download- und Upload-Links lokal als QR-Code anzeigen, um sie schnell zwischen Geräten zu übertragen."
    - id: "checksums"
      priority: "high"
      description: "SHA-256 anzeigen und kopierbar machen, damit große oder wichtige Dateien geprüft werden können."
    - id: "expiring_soon_filter"
      priority: "high"
      description: "Ansicht für Dateien, die in den nächsten 24 Stunden ablaufen."
    - id: "storage_guard"
      priority: "high"
      description: "Uploads vor vollem Datenträger stoppen und klaren Warnzustand anzeigen."
    - id: "submission_notifications"
      priority: "medium"
      description: "Bei eingegangenen Uploads optional über Apprise benachrichtigen."
    - id: "download_limit_reservation"
      priority: "high"
      description: "Downloadplätze atomar reservieren, damit parallele Downloads das Limit nicht umgehen."
    - id: "one_click_revoke"
      priority: "high"
      description: "Alle aktiven Links einer Datei mit einer Aktion widerrufen."
    - id: "browser_share_target"
      priority: "medium"
      description: "PWA Share Target, damit Dateien unter Android direkt an Dropiku geteilt werden können."
    - id: "optional_client_side_encrypted_share"
      priority: "low"
      phase: 3
      description: "Separate Freigabeart, bei der der Browser vor dem Upload verschlüsselt und der Schlüssel nur im URL-Fragment liegt."

  codex_execution_instructions:
    objective: >-
      Implementiere Dropiku vollständig anhand dieser Appspec. Behandle Sicherheitsanforderungen,
      Lifecycle-Grenzen und Capability-Semantik als verbindlich. Vereinfache sie nicht stillschweigend.
