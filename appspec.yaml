app_spec:
  schema_version: "1.0.0"
  document_status: "implementation_ready"
  language: "de-DE"

  identity:
    app_id: "dropiku"
    working_name: "Dropiku"
    naming_status: "provisional"
    category: "self_hosted_private_file_exchange"
    symbol: "cloud_upload"
    short_description: "Privater, TOTP-geschützter Dateiaustausch mit zeitlich begrenzten Download- und Upload-Freigaben."
    suite: "Pixel Soft Utility"

  product_intent:
    primary_goal: >-
      Eine einzelne Person soll auf beliebigen Geräten ohne dauerhaftes Passwort schnell Dateien
      hochladen, verwalten und wieder herunterladen können. Der Zugriff auf den privaten Bereich
      erfolgt über einen 30-Sekunden-TOTP-Code. Dateien und Upload-Anfragen können zusätzlich über
      lange, kryptografisch zufällige Capability-Links geteilt werden.
    target_user:
      count: 1
      role: "owner_admin"
      account_model: "single_user"
    core_use_cases:
      - "Auf einem fremden oder neuen Gerät per TOTP anmelden und Dateien hochladen."
      - "Auf einem anderen Gerät per TOTP anmelden und die Dateien herunterladen."
      - "Eine Datei über einen nicht erratbaren Download-Link freigeben."
      - "Einen reinen Upload-Link erstellen, über den andere Dateien abgeben, aber nichts sehen oder herunterladen können."
      - "Temporäre Dateien automatisch löschen lassen."
      - "Wichtige Dateien anpinnen und dadurch von der automatischen Dateilöschung ausnehmen."
    non_goals:
      - "Kein Mehrbenutzer-Cloudspeicher."
      - "Keine Ordnersynchronisation wie bei Nextcloud, Dropbox oder Syncthing."
      - "Keine kollaborative Bearbeitung."
      - "Keine öffentliche Dateisuche oder öffentliche Galerie."
      - "Keine serverseitige Vorschau unbekannter Dateiformate im MVP."
      - "Keine Ausführung, Entpackung oder Interpretation hochgeladener Dateien."

  terminology:
    owner_file: "Eine im privaten Bereich gespeicherte Datei."
    download_share: "Zeitlich und optional mengenmäßig begrenzte Lesefreigabe für eine oder mehrere Dateien."
    upload_request: "Schreibfreigabe, über die Dritte Dateien hochladen können, ohne Dateien aufzulisten oder herunterzuladen."
    capability_link: "Ein Link, dessen kryptografisches Geheimnis selbst die Berechtigung darstellt."
    pinned_file: "Datei ohne automatische Speicherablaufzeit; öffentliche Freigaben bleiben davon unabhängig begrenzt."
    submission: "Ein abgeschlossener Upload-Vorgang über eine Upload-Anfrage, der eine oder mehrere Dateien enthalten kann."

  implementation_stack:
    required:
      backend:
        runtime: "Node.js LTS"
        language: "TypeScript"
        framework: "Fastify"
        requirements:
          - "Datei-Uploads und Downloads vollständig streamen; keine vollständigen Dateien in den RAM laden."
          - "Strict TypeScript aktivieren."
          - "OpenAPI-Schema aus Routen-Schemas erzeugen."
      frontend:
        framework: "React"
        language: "TypeScript"
        build_tool: "Vite"
        requirements:
          - "Mobile-first."
          - "Keine externen CDN-Abhängigkeiten für Kernfunktion oder Icons."
          - "PWA-Metadaten und installierbare Web-App, aber kein verpflichtender Offline-Dateizugriff."
      database:
        engine: "SQLite"
        mode: "WAL"
        orm: "Drizzle ORM oder gleichwertig typisiert"
        location: "/data/database/dropiku.sqlite"
      storage:
        driver_mvp: "local_filesystem"
        root: "/data/files"
        temporary_root: "/data/tmp"
        quarantine_root: "/data/quarantine"
        future_driver: "s3_compatible_optional"
      packaging:
        type: "single Docker image"
        architecture:
          - "linux/amd64"
          - "linux/arm64"
        container_user: "non_root"
        listen_port: 8080
    prohibited:
      - "Speicherung von Datei-Binärdaten direkt in SQLite."
      - "Speicherung unter dem öffentlich auslieferbaren Web-Root."
      - "Selbst entwickelte Kryptografie, wenn eine etablierte Bibliothek verfügbar ist."
      - "Clientseitiges Vertrauen in Dateigröße, Dateityp, Ablaufdatum oder Berechtigungen."

  deployment_model:
    environment: "self_hosted_docker"
    intended_hosts:
      - "ZimaOS"
      - "Docker Compose"
      - "gewöhnliche Linux-Docker-Hosts"
    network:
      app_protocol: "HTTP innerhalb des vertrauenswürdigen Docker-Netzes"
      public_protocol: "HTTPS zwingend über Reverse Proxy"
      direct_public_http: false
      trust_proxy_configurable: true
    volumes:
      - host_purpose: "persistente App-Daten"
        container_path: "/data"
        required: true
    health_endpoints:
      liveness: "/health/live"
      readiness: "/health/ready"
      authenticated_diagnostics: "/api/admin/diagnostics"

  configuration:
    secret_loading:
      preferred: "Docker secrets oder gemountete Secret-Dateien"
      support_file_suffix: true
      file_suffix_pattern: "{VARIABLE}_FILE"
    required_variables:
      APP_BASE_URL:
        description: "Öffentliche HTTPS-Basis-URL ohne abschließenden Slash."
        example: "https://drop.example.invalid"
      APP_SETUP_SECRET:
        description: "Nur für die initiale Einrichtung; darf nach Abschluss nicht mehr als Web-Login dienen."
        minimum_length: 32
      APP_MASTER_KEY:
        description: "32 zufällige Bytes, Base64-kodiert; verschlüsselt TOTP-Secret und andere kleine Geheimnisse."
        format: "base64_32_bytes"
      TZ:
        default: "Europe/Berlin"
    optional_variables:
      TRUSTED_PROXIES:
        default: "loopback,linklocal,uniquelocal"
      DATA_DIR:
        default: "/data"
      MAX_STORAGE_BYTES:
        default: 107374182400
        human_default: "100 GiB"
      DEFAULT_MAX_FILE_BYTES:
        default: 5368709120
        human_default: "5 GiB"
      ABSOLUTE_MAX_FILE_BYTES:
        default: 21474836480
        human_default: "20 GiB"
      MAX_CONCURRENT_UPLOADS:
        default: 3
      MAX_CONCURRENT_DOWNLOADS:
        default: 6
      CLAMAV_HOST:
        default: null
      CLAMAV_PORT:
        default: 3310
      APPRISE_API_URL:
        default: null
      APPRISE_CONFIG_KEY:
        default: null
      LOG_LEVEL:
        default: "info"
      ENABLE_TUS_UPLOADS:
        default: false
      ENABLE_AT_REST_FILE_ENCRYPTION:
        default: false
      ALLOW_LEGACY_TOKEN_IN_PATH_LINKS:
        default: false

  first_run_setup:
    state_detection: "Keine owner-Konfiguration in der Datenbank vorhanden."
    route: "/setup"
    steps:
      - id: "verify_setup_secret"
        title: "Einrichtung freischalten"
        fields:
          - "APP_SETUP_SECRET"
        behavior:
          - "Konstantzeitvergleich verwenden."
          - "Rate-Limit anwenden."
          - "Nach erfolgreicher Gesamteinrichtung dauerhaft als verbraucht markieren."
      - id: "generate_totp"
        title: "TOTP einrichten"
        behavior:
          - "Kryptografisch zufälliges TOTP-Secret mit mindestens 160 Bit erzeugen."
          - "QR-Code, lesbares Secret und vollständige otpauth-URI anzeigen."
          - "Issuer und Account-Label aus App-Name und Hostname bilden."
          - "Keine externen QR-Code-Dienste verwenden."
      - id: "verify_totp_compatibility"
        title: "Authenticator prüfen"
        fields:
          - "erster 10-stelliger TOTP-Code"
          - "zweiter 10-stelliger TOTP-Code aus dem folgenden Zeitfenster"
        behavior:
          - "Einrichtung erst nach zwei gültigen Codes aus zwei unterschiedlichen Zeitschritten abschließen."
          - "Bei sechsstelliger Eingabe erklären, dass der verwendete Generator die digits=10-Einstellung nicht anwendendet."
          - "Hinweis auf Bitwarden Authenticator als kompatible Option anzeigen."
      - id: "recovery_codes"
        title: "Wiederherstellungscodes sichern"
        behavior:
          - "10 einmalig sichtbare Recovery-Codes erzeugen."
          - "Jeder Code besitzt mindestens 128 Bit Zufallsentropie."
          - "Nur Argon2id-Hashes speichern."
          - "Download als TXT und Kopieren anbieten."
          - "Explizite Bestätigung verlangen, dass die Codes gesichert wurden."
      - id: "finish"
        title: "Einrichtung abschließen"
        behavior:
          - "TOTP-Secret verschlüsselt persistieren."
          - "Setup-Route sperren."
          - "Erste Owner-Session erzeugen."
    offline_recovery:
      required: true
      command: "dropiku admin reset-totp"
      constraints:
        - "Nur innerhalb des Containers oder über docker exec verfügbar."
        - "Erfordert Zugriff auf APP_MASTER_KEY und das persistente Datenverzeichnis."
        - "Widerruft alle Sessions, Recovery-Codes, öffentlichen Freigaben optional nach Bestätigung und das bisherige TOTP-Secret."

  authentication:
    model: "passwordless_single_factor_totp_for_owner"
    security_notice: >-
      TOTP wird hier bewusst als alleiniger Wissens-/Besitznachweis für einen privaten Einzelnutzer verwendet.
      Es ist kein zweiter Faktor, weil kein zusätzliches Passwort existiert. Deshalb sind Rate-Limits,
      Replay-Schutz, kurze Sessions, HTTPS und sichere Wiederherstellung zwingende Bestandteile.
    totp:
      standard: "RFC 6238"
      digits: 10
      period_seconds: 30
      algorithm: "SHA1"
      issuer: "Dropiku"
      otpauth_parameters_required:
        - "secret"
        - "issuer"
        - "algorithm=SHA1"
        - "digits=10"
        - "period=30"
      verification_window:
        past_steps: 1
        current_step: true
        future_steps: 1
      replay_protection:
        enabled: true
        behavior: "Ein bereits erfolgreich verwendeter Zeitschritt darf nicht erneut für einen Login akzeptiert werden."
      clock_requirements:
        - "Serverzeit muss synchronisiert sein."
        - "Diagnostik zeigt Zeitabweichungswarnung, falls ermittelbar."
        - "Keine automatische dauerhafte Vergrößerung des Toleranzfensters."
    login_ui:
      route: "/login"
      fields:
        - type: "text"
          inputmode: "numeric"
          autocomplete: "one-time-code"
          exact_length: 10
          visual_grouping: "5-5"
      behavior:
        - "Führende Nullen erhalten."
        - "Nur Ziffern annehmen."
        - "Automatisches Absenden nach 10 Ziffern optional, aber bei reduzierter Bewegung deaktivierbar."
        - "Keine Information ausgeben, ob Code, Zeitschritt oder Rate-Limit-Kriterium intern fehlgeschlagen ist."
    sessions:
      type: "opaque_server_side"
      token_entropy_bits: 256
      storage: "Nur Hash des Session-Tokens speichern."
      cookie:
        name: "__Host-dropiku_session"
        secure: true
        http_only: true
        same_site: "Strict"
        path: "/"
      idle_timeout_minutes: 30
      absolute_timeout_hours: 12
      rotate_after_login: true
      revoke_on_totp_reset: true
      revoke_all_action: true
    recovery_login:
      route: "/login/recovery"
      rate_limited: true
      one_time_use: true
      behavior:
        - "Nach erfolgreicher Nutzung sofort TOTP-Neueinrichtung verlangen."
        - "Alle bestehenden Sessions widerrufen."

  rate_limiting:
    storage: "SQLite-backed oder in-memory mit persistentem globalem Lockout-Status; Reverse-Proxy-Limit zusätzlich empfohlen."
    response:
      status_code: 429
      include_retry_after: true
      generic_error_messages: true
    owner_login:
      dimensions:
        - "source_ip"
        - "global"
      source_ip_policy:
        burst_attempts: 5
        burst_window_minutes: 5
        hourly_attempts: 20
        lockout_schedule_seconds:
          - 30
          - 60
          - 300
          - 900
          - 3600
      global_policy:
        attempts_per_10_minutes: 100
        behavior: "Temporärer globaler Schutzmodus ohne Offenlegung interner Schwellenwerte."
      success_behavior:
        - "IP-spezifische Fehlversuchsserie zurücksetzen."
        - "Sicherheitsereignis protokollieren, aber niemals TOTP-Code protokollieren."
    setup_secret:
      attempts_per_15_minutes_per_ip: 5
      attempts_per_hour_global: 20
    public_download:
      per_ip_per_minute: 60
      per_share_per_minute: 120
      concurrent_per_ip: 4
    public_upload:
      request_initializations_per_ip_per_minute: 10
      failed_token_resolutions_per_ip_per_15_minutes: 30
      concurrent_per_ip: 2
      concurrent_per_upload_request: 3
      byte_rate_limit_configurable: true
    metadata_api:
      authenticated_requests_per_minute: 300

  capability_link_design:
    objective: "Freigabe-Geheimnisse sollen weder in Reverse-Proxy-Pfaden noch in Referer-Headern oder üblichen Access-Logs erscheinen."
    default_format:
      download: "{APP_BASE_URL}/s/{public_id}#{secret}"
      upload_request: "{APP_BASE_URL}/r/{public_id}#{secret}"
    public_id:
      entropy_bits: 128
      encoding: "base64url_without_padding"
      purpose: "Identifiziert den Freigabedatensatz, erteilt allein aber keine Berechtigung."
    secret:
      entropy_bits: 256
      encoding: "base64url_without_padding"
      storage: "Nur HMAC-SHA-256 oder SHA-256-Hash mit serverseitigem Pepper speichern."
      transport: "URL-Fragment; wird vom Browser nicht im initialen HTTP-Request übertragen."
    resolution_flow:
      - "Frontend liest das Fragment lokal."
      - "Frontend sendet public_id und secret per POST an einen no-store API-Endpunkt."
      - "Server verifiziert den Hash in Konstantzeit."
      - "Server erstellt eine kurzlebige, auf die konkrete Freigabe beschränkte Capability-Session."
      - "Fragment mit history.replaceState aus der sichtbaren URL entfernen."
      - "Download oder Upload über die Capability-Session ausführen."
    capability_session:
      lifetime_minutes: 15
      cookie_or_header: "kurzlebiges HttpOnly-Cookie bevorzugt"
      scope: "genau eine share_id oder upload_request_id"
      reusable_within_lifetime: true
    legacy_links:
      token_in_path_allowed: false
      optional_feature_flag: "ALLOW_LEGACY_TOKEN_IN_PATH_LINKS"
      warning: "Bei Aktivierung können Geheimnisse in Proxy- und Browser-Logs auftauchen."
    headers:
      Referrer-Policy: "no-referrer"
      Cache-Control: "no-store, private"
      X-Content-Type-Options: "nosniff"
      Content-Security-Policy: "default-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'none'"

  file_lifecycle:
    retention_model:
      unpinned:
        configurable_presets:
          - "15 minutes"
          - "1 hour"
          - "6 hours"
          - "24 hours"
          - "3 days"
          - "7 days"
        default: "24 hours"
        absolute_maximum: "168 hours from completed upload"
        expiry_anchor: "upload_completed_at"
      pinned:
        expires_at: null
        automatic_deletion: false
        public_share_behavior: "Öffentliche Links bleiben unabhängig auf maximal 7 Tage begrenzt."
      upload_request_links:
        default: "24 hours"
        absolute_maximum: "168 hours from creation"
      download_share_links:
        default: "24 hours"
        absolute_maximum: "168 hours from creation"
    cleanup_worker:
      interval_minutes: 5
      startup_cleanup: true
      behavior:
        - "Abgelaufene Freigaben deaktivieren."
        - "Abgelaufene, nicht angepinnte Dateien transaktional als deleting markieren."
        - "Datei vom Storage entfernen."
        - "Metadaten nach erfolgreicher Löschung entfernen oder als Tombstone für Audit-Aufbewahrung reduzieren."
        - "Fehlgeschlagene Löschungen mit Backoff wiederholen."
        - "Verwaiste temporäre Uploads bereinigen."
    delete_semantics:
      owner_delete: "Sofortige logische Deaktivierung; physische Löschung im Hintergrund."
      cascade:
        - "Alle Download-Freigaben der Datei widerrufen."
        - "Aktive Downloads dürfen nicht neu begonnen werden."
        - "Bereits laufende Streams dürfen konfigurierbar beendet oder abgeschlossen werden; Standard: beenden."

  file_ingestion:
    accepted_types: "all_binary_types"
    default_serve_mode: "attachment_only"
    upload_pipeline:
      - "Anfrage und Berechtigung vor Annahme größerer Datenmengen prüfen."
      - "Konfiguriertes Größenlimit serverseitig und möglichst schon am Reverse Proxy erzwingen."
      - "In zufällige temporäre Datei streamen."
      - "Während des Streams SHA-256 berechnen."
      - "Tatsächliche Byteanzahl zählen und gegen Limits prüfen."
      - "Optional ClamAV-Scan durchführen."
      - "Bei Erfolg atomar in den finalen Storage verschieben."
      - "Metadaten in einer Datenbanktransaktion finalisieren."
      - "Bei Fehler temporäre Daten sicher entfernen."
    filename_handling:
      original_filename: "Als Anzeige-Metadatum erhalten, Unicode normalisieren und Länge begrenzen."
      storage_filename: "Zufällige UUIDv7 oder 256-Bit-ID ohne Originalerweiterung."
      max_display_length: 255
      path_components_allowed: false
      duplicate_names: "Erlaubt; intern immer eindeutige Storage-ID."
    mime_handling:
      client_content_type_trusted: false
      detected_mime_stored: true
      download_header: "Content-Disposition: attachment mit sicher kodiertem Dateinamen"
      inline_rendering: false
    archive_behavior:
      extract_archives: false
      inspect_archive_contents: false
    malware_scanning:
      mode: "optional"
      provider_mvp: "ClamAV clamd"
      states:
        - "not_configured"
        - "pending"
        - "clean"
        - "infected"
        - "scan_error"
      fail_policy_default: "quarantine_on_scan_error"
      infected_behavior:
        - "Nicht in normalen Storage übernehmen."
        - "Keine Download-Freigabe erlauben."
        - "Owner deutlich warnen."
        - "Löschen oder isoliert behalten als Adminentscheidung."
    resumable_uploads:
      phase: 2
      protocol: "tus 1.0"
      required_when_enabled:
        - "Upload-Offset serverseitig validieren."
        - "Limits vor und während des Uploads erzwingen."
        - "Abgebrochene Uploads automatisch bereinigen."
        - "Capability- und Owner-Berechtigungen unverändert anwenden."

  owner_file_management:
    actions:
      - "upload"
      - "download"
      - "rename_display_name"
      - "pin"
      - "unpin_with_new_expiry"
      - "change_expiry_within_limits"
      - "create_download_share"
      - "revoke_download_share"
      - "copy_sha256"
      - "delete"
      - "bulk_delete"
      - "bulk_pin"
      - "bulk_change_expiry"
    metadata_visible:
      - "display_name"
      - "size_bytes"
      - "created_at"
      - "upload_source"
      - "expires_at"
      - "pinned"
      - "sha256"
      - "detected_mime"
      - "malware_scan_state"
      - "download_count_owner"
      - "download_count_public"
      - "active_share_count"
    search:
      fields:
        - "display_name"
        - "detected_mime"
        - "sha256"
      server_side: true
    sorting:
      options:
        - "newest"
        - "oldest"
        - "name"
        - "size_desc"
        - "expires_soon"
    filters:
      - "pinned"
      - "expiring"
      - "shared"
      - "uploaded_by_request"
      - "scan_state"

  download_shares:
    scope:
      types:
        - "single_file"
        - "multiple_files_as_share_page"
      zip_download_phase: 2
    creation_options:
      expires_in:
        presets:
          - "15 minutes"
          - "1 hour"
          - "6 hours"
          - "24 hours"
          - "3 days"
          - "7 days"
        maximum: "7 days"
      max_downloads:
        nullable: true
        minimum: 1
        maximum: 10000
      require_additional_passphrase:
        default: false
        phase: 2
      download_behavior:
        options:
          - "show_landing_page"
          - "start_download_after_resolution"
        default: "show_landing_page"
      custom_label:
        max_length: 100
        optional: true
    public_page:
      may_show:
        - "owner-defined label"
        - "safe display filename"
        - "file size"
        - "remaining availability as coarse duration"
      must_not_show:
        - "owner identity"
        - "other files"
        - "storage path"
        - "internal IDs"
        - "exact server diagnostics"
        - "total storage usage"
    accounting:
      count_when: "Download-Stream erfolgreich gestartet und mindestens ein konfigurierbarer Mindestanteil übertragen wurde."
      default_minimum_bytes: 1048576
      small_file_behavior: "Bei Dateien unter 1 MiB nach vollständiger Übertragung zählen."
      race_condition_handling: "Atomare Reservierung eines Download-Slots vor Streambeginn."
    revoke:
      immediate: true
      owner_action: true

  upload_requests:
    security_property: "write_only"
    hard_rules:
      - "Linkinhaber dürfen niemals vorhandene Dateien oder andere Einreichungen auflisten."
      - "Linkinhaber dürfen hochgeladene Dateien nicht herunterladen."
      - "Dateinamen anderer Einreichungen dürfen nicht offengelegt werden."
      - "Upload-Erfolg darf keine internen Storage-IDs offenlegen."
    creation_options:
      title:
        default: "Dateien hochladen"
        max_length: 100
      message:
        optional: true
        max_length: 500
      expires_in:
        default: "24 hours"
        maximum: "7 days"
      max_files_per_submission:
        default: 10
        minimum: 1
        maximum: 100
      max_submissions:
        default: 1
        nullable_for_unlimited_within_expiry: true
        maximum: 10000
      max_file_size_bytes:
        default_source: "DEFAULT_MAX_FILE_BYTES"
        maximum_source: "ABSOLUTE_MAX_FILE_BYTES"
      max_total_bytes_per_submission:
        default: 10737418240
        human_default: "10 GiB"
      max_total_bytes_all_submissions:
        nullable: true
      allowed_extensions:
        mode: "optional_allowlist"
        case_insensitive: true
      denied_extensions:
        mode: "optional_denylist"
        warning: "Nie als alleinige Sicherheitsmaßnahme verwenden."
      optional_submitter_fields:
        display_name:
          enabled_default: false
          required_configurable: true
          max_length: 100
        message:
          enabled_default: false
          required_configurable: false
          max_length: 500
      notify_owner_on_submission:
        default: true
        channels:
          - "in_app_activity"
          - "apprise_if_configured"
      retain_uploaded_files_for:
        default: "7 days"
        maximum: "7 days"
        note: "Owner kann eingegangene Dateien anschließend anpinnen."
    upload_page:
      shows:
        - "Titel"
        - "optionale Nachricht"
        - "zulässige maximale Dateigröße"
        - "maximale Anzahl Dateien pro Einreichung"
        - "optional erlaubte Dateitypen"
        - "Ablaufstatus"
      hides:
        - "Anzahl bereits empfangener Einreichungen, sofern nicht für UX nötig"
        - "Dateinamen anderer Personen"
        - "Owner-Dateiliste"
        - "interne Limits und IDs"
      after_success:
        - "Neutrale Erfolgsbestätigung anzeigen."
        - "Einreichungsreferenz als zufällige, nicht sicherheitsrelevante Kurz-ID anzeigen."
        - "Keine Downloadmöglichkeit anbieten."
        - "Weitere Einreichung nur erlauben, wenn das Limit dies zulässt."
    owner_view:
      group_by_submission: true
      actions:
        - "download individual file"
        - "download submission as zip in phase 2"
        - "pin selected files"
        - "rename"
        - "delete"
        - "revoke upload request"

  storage_protection:
    capacity_controls:
      configured_quota: "MAX_STORAGE_BYTES"
      reject_new_upload_threshold_percent: 98
      warning_threshold_percent: 85
      critical_threshold_percent: 95
      temp_space_reserved_percent: 5
    deduplication:
      mvp: false
      reason: "Vermeidet Referenzzählungs- und Informationsleck-Komplexität im ersten Release."
    at_rest_encryption:
      phase: 2
      enabled_by_feature_flag: true
      design:
        algorithm: "Streaming AEAD über etablierte Bibliothek, z. B. libsodium secretstream XChaCha20-Poly1305"
        per_file_key: true
        key_wrapping: "Per-file key mit APP_MASTER_KEY verschlüsseln."
        integrity_required: true
        migration_required: true
      prohibited:
        - "Eine große Datei als einzelnes AES-GCM-Paket vollständig in den RAM laden."
        - "Eigene Chunk-Kryptografie ohne etablierte Konstruktion."
    backups:
      requirements:
        - "Datenbank und Datei-Storage müssen gemeinsam konsistent sicherbar sein."
        - "Dokumentiere einen Wartungs-/Snapshot-Modus."
        - "APP_MASTER_KEY und Recovery-Codes gehören nicht in unverschlüsselte Backups."

  data_model:
