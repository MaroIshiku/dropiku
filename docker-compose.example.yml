services:
  dropiku:
    image: ghcr.io/maroishiku/dropiku:latest
    container_name: dropiku
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_BASE_URL: "https://drop.example.invalid"
      APP_SETUP_SECRET_FILE: "/run/secrets/dropiku_setup_secret"
      APP_MASTER_KEY_FILE: "/run/secrets/dropiku_master_key"
      TZ: "Europe/Berlin"
      TRUSTED_PROXIES: "false"
      MAX_STORAGE_BYTES: "107374182400"
      DEFAULT_MAX_FILE_BYTES: "5368709120"
      ABSOLUTE_MAX_FILE_BYTES: "21474836480"
      LOG_LEVEL: "info"
    secrets:
      - dropiku_setup_secret
      - dropiku_master_key
    volumes:
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  dropiku_setup_secret:
    file: ./secrets/setup_secret.txt
  dropiku_master_key:
    file: ./secrets/master_key.txt
